<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Golf Club Scoring</title>
  <meta name="description" content="Scoring apps for Wanneroo Golf Club and Nedlands Golf Club.">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f5132;
      color: #f8f9fa;
    }
    h1 { margin: 0; font-size: clamp(1.6rem, 4vw, 2.4rem); text-align: center; }
    p.tagline { margin: 0; opacity: 0.85; text-align: center; }
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      justify-content: center;
      width: 100%;
      max-width: 640px;
    }
    a.card {
      flex: 1 1 240px;
      display: block;
      padding: 1.75rem 1.5rem;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: inherit;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    a.card:hover, a.card:focus {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.16);
    }
    a.card h2 { margin: 0 0 0.35rem; font-size: 1.3rem; }
    a.card span { opacity: 0.8; font-size: 0.95rem; }
    footer { opacity: 0.6; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Golf Club Scoring</h1>
    <p class="tagline">Choose your club to open its scoring app.</p>
  </header>
  <main class="cards">
    <a class="card" href="./wanneroo/">
      <h2>Wanneroo Golf Club</h2>
      <span>Open scoring app &rarr;</span>
    </a>
    <a class="card" href="./nedlands/">
      <h2>Nedlands Golf Club</h2>
      <span>Open scoring app &rarr;</span>
    </a>
  </main>
  <footer>Installable web apps &middot; works offline once loaded.</footer>
</body>
</html>
